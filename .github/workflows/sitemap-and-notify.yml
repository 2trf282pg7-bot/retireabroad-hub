name: Update Sitemap

on:
  workflow_run:
    workflows: ["Auto Generate Article"]
    types:
      - completed
  workflow_dispatch:

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run sitemap updater
        run: python update_sitemap.py

      - name: Commit updated sitemap
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "RetireAbroadHub Bot"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "Auto: Update sitemap.xml $(date +'%Y-%m-%d')"
          git push
