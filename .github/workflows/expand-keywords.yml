name: Expand Keywords Weekly

on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:

jobs:
  expand-keywords:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic google-auth google-api-python-client

      - name: Run Failure DB expansion
        run: python expand_keywords_failuredb.py

      - name: Run AI keyword expansion
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python expand_keywords_ai.py

      - name: Run GSC keyword expansion
        env:
          GSC_CREDENTIALS_JSON: ${{ secrets.GSC_CREDENTIALS_JSON }}
        run: python expand_keywords_gsc.py

      - name: Commit and push expanded keywords
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "RetireAbroadHub Bot"
          git add keywords.json
          git diff --staged --quiet || git commit -m "Auto: Expand keywords $(date +'%Y-%m-%d')"
          git push
