name: Auto Post Social Media

on:
  schedule:
    - cron: '0 23 * * 0,2,4'
  workflow_dispatch:

jobs:
  post-social:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic tweepy

      - name: Post to X (Twitter)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: python post_social.py

      - name: Commit updated logs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "RetireAbroadHub Bot"
          git add social_log.json done_social.json
          git diff --staged --quiet || git commit -m "Auto: Social post log $(date +'%Y-%m-%d')"
          git push
